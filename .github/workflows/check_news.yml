name: Check AI News

on:
  schedule:
    # Se ejecuta cada 30 minutos (horario UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permite la ejecución manual desde la pestaña Actions de GitHub

jobs:
  check-and-send:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run News Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Commit and Push state changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Verificar si hay cambios en sent_articles.json
        if [ -f sent_articles.json ]; then
          git add sent_articles.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update sent articles list [skip ci]"
            git push
          else
            echo "Sin cambios en la lista de artículos enviados."
          fi
        else
          echo "No se encontró el archivo de estado sent_articles.json."
        fi
